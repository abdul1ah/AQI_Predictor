name: Model Training Pipeline

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '0 0 * * *' # schedules the script to run automatically every day at midnight

jobs:
  train-and-register:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Training Pipeline
        env: 
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: |
          python -u -m src.training_pipeline.register_model

      - name: Upload SHAP Feature Importance Plots
        uses: actions/upload-artifact@v4
        with:
          name: shap-feature-plots
          path: '*.png'